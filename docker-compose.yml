version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: histopath-api
    ports:
      - "8000:8000"
    volumes:
      - ./model/weights:/app/model/weights
      - ./assets:/app/assets
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout:  10s
      retries:  3